<div id="teacherBox">

<h1>🎮 Teacher Control</h1>

Room Code:

<br>

<input id="roomInput">

<br><br>

Game Time (Minutes):

<br>

<input 
id="timeInput"
type="number"
min="1"
max="60"
step="1"
value="8"
class="timeSelector"
>

<button class="teacherBtn" onclick="openRoom()">Open Room</button>

<button class="teacherBtn" onclick="startGame()">Start Game</button>

<button class="teacherBtn" onclick="goToFinalRanking()">
🏆 Final Ranking
</button>
  
<h2>Players</h2>

<div id="playersList"></div>

</div>

<script>

let roomCode="";

function openRoom(){

roomCode = document.getElementById("roomInput").value;

firebase.database()
.ref("rooms/"+roomCode)
.set({
status:"waiting",
startTime:0,
players:{},
firstTry:{}
});

listenPlayers();

// 🔊 sonido
document.getElementById("openSound").play();

// ✨ animación botón
let btn = document.querySelector(".teacherBtn");

btn.classList.add("roomActive");

}

function startGame(){

let btns = document.querySelectorAll(".teacherBtn");
let startBtn = btns[1]; // segundo botón

// animación arcade
startBtn.style.transform="scale(1.1)";
startBtn.style.boxShadow="0 0 20px #00ffff";
startBtn.classList.add("roomActive");

// sonido de inicio
let startSound = new Audio("start.mp3");
startSound.volume = 0.6;
startSound.play();

let minutes = document.getElementById("timeInput").value;

if(!minutes){
minutes = 8;
}

let seconds = minutes * 60;

firebase.database()
.ref("rooms/"+roomCode)
.update({
status:"playing",
startTime: Date.now(),
gameTime: seconds
});

}

function listenPlayers(){

firebase.database()
.ref("rooms/"+roomCode+"/players")
.on("value", snap=>{

let data = snap.val();

if(!data) return;

let html="";

Object.values(data).forEach(p=>{

html += p.name + " — " + p.score + "<br>";

});

document.getElementById("playersList").innerHTML = html;

});

}

function goToFinalRanking(){

if(!roomCode){
alert("Open a room first");
return;
}

window.open("index.html?final="+roomCode, "_blank");

}
  
</script>
